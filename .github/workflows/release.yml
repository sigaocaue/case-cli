name: Release

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest --cov=case_cli -v

  publish-pypi:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  update-homebrew:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Get version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -oP '(?<=version = ")([^"]+)' pyproject.toml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI availability
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "Waiting for case-cli $VERSION to be available on PyPI..."
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/case-cli/$VERSION/json" > /dev/null 2>&1; then
              echo "Package is available on PyPI."
              exit 0
            fi
            echo "Attempt $i/30 - not yet available, waiting 10s..."
            sleep 10
          done
          echo "Package not available on PyPI after 5 minutes."
          exit 1

      - name: Get sdist SHA256
        id: sha
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA=$(curl -sf "https://pypi.org/pypi/case-cli/$VERSION/json" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for url_info in data['urls']:
              if url_info['packagetype'] == 'sdist':
                  print(url_info['digests']['sha256'])
                  break
          ")
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: "Formula/case-cli.rb"
          destination_repo: "sigaocaue/homebrew-case-cli"
          destination_folder: "Formula"
          user_email: "github-actions[bot]@users.noreply.github.com"
          user_name: "github-actions[bot]"
          commit_message: "chore: update case-cli to ${{ steps.version.outputs.version }}"
          use_rsync: "false"

      - name: Patch formula with correct version and SHA
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const sha256 = '${{ steps.sha.outputs.sha256 }}';

            const { data: file } = await github.rest.repos.getContent({
              owner: 'sigaocaue',
              repo: 'homebrew-case-cli',
              path: 'Formula/case-cli.rb',
            });

            let content = Buffer.from(file.content, 'base64').toString('utf-8');
            content = content.replace(
              /url "https:\/\/files\.pythonhosted\.org\/packages\/source\/c\/case-cli\/case-cli-.*\.tar\.gz"/,
              `url "https://files.pythonhosted.org/packages/source/c/case-cli/case-cli-${version}.tar.gz"`
            );
            content = content.replace(
              /sha256 ".*"/,
              `sha256 "${sha256}"`
            );

            await github.rest.repos.createOrUpdateFileContents({
              owner: 'sigaocaue',
              repo: 'homebrew-case-cli',
              path: 'Formula/case-cli.rb',
              message: `chore: update case-cli to ${version}`,
              content: Buffer.from(content).toString('base64'),
              sha: file.sha,
            });
