name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest --cov=case_cli -v

  bump-version:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          uv run bump-my-version bump ${{ inputs.bump }}
          VERSION=$(uv run bump-my-version show current_version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to version $VERSION"

      - name: Push commit and tag
        run: git push origin main --follow-tags

  publish-pypi:
    needs: bump-version
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  update-homebrew:
    needs: [bump-version, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Wait for PyPI availability
        run: |
          VERSION=${{ needs.bump-version.outputs.version }}
          echo "Waiting for case-cli $VERSION to be available on PyPI..."
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/case-cli/$VERSION/json" > /dev/null 2>&1; then
              echo "Package is available on PyPI."
              exit 0
            fi
            echo "Attempt $i/30 - not yet available, waiting 10s..."
            sleep 10
          done
          echo "Package not available on PyPI after 5 minutes."
          exit 1

      - name: Get sdist SHA256
        id: sha
        run: |
          VERSION=${{ needs.bump-version.outputs.version }}
          SHA=$(curl -sf "https://pypi.org/pypi/case-cli/$VERSION/json" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for url_info in data['urls']:
              if url_info['packagetype'] == 'sdist':
                  print(url_info['digests']['sha256'])
                  break
          ")
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const version = '${{ needs.bump-version.outputs.version }}';
            const sha256 = '${{ steps.sha.outputs.sha256 }}';
            const owner = 'sigaocaue';
            const repo = 'homebrew-case-cli';
            const path = 'Formula/case-cli.rb';

            const formula = [
              '# Homebrew formula for case-cli',
              '',
              'class CaseCli < Formula',
              '  include Language::Python::Virtualenv',
              '',
              '  desc "Command-line tool for converting strings between case styles"',
              '  homepage "https://github.com/sigaocaue/case-cli"',
              `  url "https://files.pythonhosted.org/packages/source/c/case-cli/case_cli-${version}.tar.gz"`,
              `  sha256 "${sha256}"`,
              '  license "MIT"',
              '',
              '  depends_on "python@3"',
              '',
              '  def install',
              '    virtualenv_install_with_resources',
              '  end',
              '',
              '  test do',
              '    assert_equal "hello_world", shell_output("#{bin}/case-cli \'hello world\' --case=snake").strip',
              '  end',
              'end',
              '',
            ].join('\n');

            // Check if file already exists
            let existingSha;
            try {
              const { data: existing } = await github.rest.repos.getContent({
                owner, repo, path,
              });
              existingSha = existing.sha;
            } catch (e) {
              // File does not exist yet, will be created
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              message: `chore: update case-cli to ${version}`,
              content: Buffer.from(formula).toString('base64'),
              ...(existingSha && { sha: existingSha }),
            });
